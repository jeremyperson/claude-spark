<svg width="1280" height="280" viewBox="0 0 1280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="s" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#3B2A22" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="0.5" stop-color="#E8862E"/>
      <stop offset="1" stop-color="#E5484D"/>
    </linearGradient>
    <path id="logo" clip-rule="evenodd" fill-rule="evenodd"
      d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z"/>
  </defs>

  <rect width="1280" height="280" fill="#FFFFFF"/>

  <!-- 5 cards -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">

    <!-- Working -->
    <g transform="translate(70,30)">
      <rect width="170" height="170" rx="40" fill="#F5F1EA" filter="url(#s)"/>
      <use href="#logo" transform="translate(40,40) scale(3.75)" fill="#D97757"/>
      <text x="85" y="222" fill="#3B2A22">Working</text>
    </g>

    <!-- Done -->
    <g transform="translate(303,30)">
      <rect width="170" height="170" rx="40" fill="#F5F1EA" filter="url(#s)"/>
      <use href="#logo" transform="translate(40,40) scale(3.75)" fill="#D97757"/>
      <text x="18" y="34" font-size="30" fill="#D97757">✦</text>
      <text x="150" y="50" font-size="22" fill="#E8862E">✧</text>
      <text x="85" y="222" fill="#3B2A22">Done</text>
    </g>

    <!-- Needs you (glow ring) -->
    <g transform="translate(536,30)">
      <rect x="-5" y="-5" width="180" height="180" rx="45" fill="none" stroke="#D97757" stroke-width="5" opacity="0.55"/>
      <rect width="170" height="170" rx="40" fill="#F5F1EA" filter="url(#s)"/>
      <use href="#logo" transform="translate(40,40) scale(3.75)" fill="#C2613F"/>
      <text x="85" y="222" fill="#3B2A22">Needs you</text>
    </g>

    <!-- Error -->
    <g transform="translate(769,30)">
      <rect width="170" height="170" rx="40" fill="#FBE8E6" filter="url(#s)"/>
      <use href="#logo" transform="translate(40,40) scale(3.75)" fill="#C0392B"/>
      <text x="85" y="222" fill="#3B2A22">Error</text>
    </g>

    <!-- Typing (heat) -->
    <g transform="translate(1002,30)">
      <rect width="170" height="170" rx="40" fill="#F5F1EA" filter="url(#s)"/>
      <use href="#logo" transform="translate(40,40) scale(3.75)" fill="url(#heat)"/>
      <rect x="55" y="120" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#3B2A22" stroke-opacity="0.25"/>
      <rect x="100" y="128" width="14" height="14" rx="4" fill="#FFFFFF" stroke="#3B2A22" stroke-opacity="0.25"/>
      <text x="85" y="222" fill="#3B2A22">Typing</text>
    </g>
  </g>
</svg>
